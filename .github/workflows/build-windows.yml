name: Build Windows EXE

on:
  push:
    branches: [master]
    paths: ["magicpaste-windows/**", ".github/workflows/build-windows.yml"]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: magicpaste-windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Build EXE
        run: pyinstaller magicpaste.spec

      - name: Install Inno Setup
        if: github.event_name == 'release'
        run: choco install innosetup --yes
        shell: powershell

      - name: Build installer
        if: github.event_name == 'release'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'
        shell: powershell

      - name: Upload EXE artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: magicpaste-windows
          path: magicpaste-windows/dist/MagicPaste.exe

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            magicpaste-windows/dist/MagicPaste.exe
            magicpaste-windows/dist/MagicPaste-Setup-v0.1.0-beta.exe
