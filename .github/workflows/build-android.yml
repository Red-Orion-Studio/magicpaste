name: Build Android APK

on:
  push:
    branches: [main]
    paths: ["magicpaste-android/**", ".github/workflows/build-android.yml"]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: magicpaste-android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Generate the android/ platform scaffolding (gradle, MainActivity, etc.)
      # that we don't keep in the repo, then restore our custom manifest.
      - name: Scaffold platform files
        run: |
          cp android/app/src/main/AndroidManifest.xml /tmp/MagicManifest.xml
          flutter create --platforms=android --org com.magicpaste --project-name magicpaste .
          cp /tmp/MagicManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: magicpaste-android
          path: magicpaste-android/build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: magicpaste-android/build/app/outputs/flutter-apk/app-release.apk
