name: Build Android APK

on:
  push:
    branches: [master]
    paths: ["magicpaste-android/**", ".github/workflows/build-android.yml"]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: magicpaste-android
        run: flutter pub get

      - name: Run tests
        working-directory: magicpaste-android
        run: flutter test

      # Signed release — only on GitHub Release events
      - name: Decode keystore
        if: github.event_name == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/magicpaste-android/magicpaste-release.jks"

      - name: Create key.properties
        if: github.event_name == 'release'
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "${{ secrets.STORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "$GITHUB_WORKSPACE/magicpaste-android/magicpaste-release.jks" \
            > "$GITHUB_WORKSPACE/magicpaste-android/key.properties"

      - name: Build signed release APK
        if: github.event_name == 'release'
        working-directory: magicpaste-android
        run: flutter build apk --release

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: magicpaste-android/build/app/outputs/flutter-apk/app-release.apk

      # Debug build for push/dispatch — no signing needed
      - name: Build debug APK
        if: github.event_name != 'release'
        working-directory: magicpaste-android
        run: flutter build apk --debug

      - name: Upload debug artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: magicpaste-android-debug
          path: magicpaste-android/build/app/outputs/flutter-apk/app-debug.apk
