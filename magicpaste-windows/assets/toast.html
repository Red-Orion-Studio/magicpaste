<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MagicPaste</title>
<style>
  :root {
    --violet: #7C3AED; --violet-bright: #9B6BF5; --violet-glow: rgba(124,58,237,0.45);
    --text: #ECECF1; --text-dim: rgba(236,236,241,0.55); --text-faint: rgba(236,236,241,0.34);
    --glass: rgba(24,24,31,0.82); --border: rgba(255,255,255,0.09);
    --font: "Segoe UI Variable Display","Segoe UI",system-ui,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; font-family:var(--font); color:var(--text); overflow:hidden; user-select:none; }
  #toast {
    position:fixed; inset:0;
    display:flex; align-items:center; gap:14px;
    padding:14px 16px 14px 18px; overflow:hidden;
    background:var(--glass);
    backdrop-filter: blur(34px) saturate(160%);
    border:1px solid var(--border); border-radius:12px;
    box-shadow:0 24px 60px rgba(0,0,0,0.5);
    animation: rise 0.45s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rise { from { opacity:0; transform:translateY(14px);} to { opacity:1; transform:none; } }
  #toast::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--violet-bright),var(--violet)); box-shadow:0 0 14px var(--violet-glow); }
  .logo-mark { width:18px; height:18px; border-radius:5px; background:linear-gradient(150deg,var(--violet-bright),var(--violet)); display:flex; align-items:center; justify-content:center; flex:none; }
  .icon { display:block; }
  .t-body { flex:1; min-width:0; }
  .t-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .t-app { font-size:12px; font-weight:600; color:var(--text-dim); }
  .t-msg { font-size:14px; font-weight:600; }
  .t-time { font-size:11px; color:var(--text-faint); margin-top:3px; }
  .shot { width:46px; height:62px; border-radius:8px; overflow:hidden; flex:none; border:1px solid var(--border);
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.045) 0 7px, rgba(255,255,255,0.015) 7px 14px), linear-gradient(160deg,#2a2440,#16131f); }
  .shot img { width:100%; height:100%; object-fit:cover; display:block; }
  #close { position:absolute; top:6px; right:8px; width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; color:var(--text-faint); font-size:15px; line-height:1; cursor:pointer; z-index:5; transition:background .12s,color .12s; }
  #close:hover { background:rgba(255,255,255,0.12); color:var(--text); }
</style>
</head>
<body>
<div id="toast">
  <div id="close" onclick="window.pywebview && window.pywebview.api && window.pywebview.api.hide_toast()" title="Dismiss">&#10005;</div>
  <div class="t-body">
    <div class="t-head">
      <img class="logo-mark" src="logo.png" alt="" />
      <span class="t-app">MagicPaste</span>
    </div>
    <div class="t-msg" id="msg">Screenshot copied to clipboard</div>
    <div class="t-time" id="time">from a device · now</div>
  </div>
  <div class="shot" id="shot"></div>
</div>
<script>
  function render(s) {
    if (s.msg) document.getElementById('msg').textContent = s.msg;
    document.getElementById('time').textContent =
      s.sub || (s.device ? 'from ' + s.device + ' · now' : 'now');
    const shot = document.getElementById('shot');
    if (s.thumb) { shot.style.display = ''; shot.innerHTML = '<img src="data:image/png;base64,' + s.thumb + '">'; }
    else { shot.style.display = 'none'; }
  }
  window.mpRender = render;
</script>
</body>
</html>
